name: Lint Skills

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-skills:
    name: Skill-contract linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run skill-contract linter
        run: bash tools/lint-skills.sh
